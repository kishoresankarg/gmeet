services:
  backend:
    build: ./backend
    container_name: meeting_notes_backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: ${MONGODB_URL}
      DATABASE_NAME: ${DATABASE_NAME:-meeting_notes_db}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      ENVIRONMENT: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # volumes:
    #   - ./backend:/app

  frontend:
    build: ./frontend
    container_name: meeting_notes_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    depends_on:
      backend:
        condition: service_healthy
    # volumes:
    #   - ./frontend:/app
