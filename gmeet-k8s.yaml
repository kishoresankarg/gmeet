apiVersion: apps/v1
kind: Deployment
metadata:
  name: gmeet-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gmeet-backend
  template:
    metadata:
      labels:
        app: gmeet-backend
    spec:
      initContainers:
      - name: wait-for-mongo
        image: busybox
        command:
        - sh
        - -c
        - |
          until nc -z mongo-service 27017; do
            echo "Waiting for MongoDB..."
            sleep 2
          done
          sleep 5
      containers:
      - name: backend
        image: gmeet-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: MONGODB_URL
          value: "mongodb://mongo-service:27017/?tls=false"
        - name: CLAUDE_API_KEY
          value: "your_api_key_here"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gmeet-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gmeet-frontend
  template:
    metadata:
      labels:
        app: gmeet-frontend
    spec:
      containers:
      - name: frontend
        image: gmeet-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: gmeet-backend-service
spec:
  type: NodePort
  selector:
    app: gmeet-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
    nodePort: 30002

---
apiVersion: v1
kind: Service
metadata:
  name: gmeet-frontend-service
spec:
  type: NodePort
  selector:
    app: gmeet-frontend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    nodePort: 30001
